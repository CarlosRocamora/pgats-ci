name: 'Execução Manual'

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    # Permissão para escrever no repositório (necessária para o deploy)
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Instalando Yarn
        run: npm install -g yarn

      - name: Instalando dependências
        run: yarn

      - name: Instalando Browsers do Playwright
        run: yarn playwright install

      - name: Executando testes e2e
        run: yarn run e2e

      # Publicar o relatório HTML no GitHub Pages
      - name: Deploy do relatório no GitHub Pages
        if: always()   # publica o relatório mesmo se houver falhas
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report   # pasta gerada pelo Playwright
          destination_dir: relatorio-e2e     # subpasta no Pages (opcional)